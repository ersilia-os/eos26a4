Identifier: eos26a4
Slug: lazychemvis-coconut
Status: In progress
Title: 2D Projector trained on Coconut
Description: This model uses lazy-chemvis tool to performs PCA, UMAP, t-SNE and 
  TMAP projections taking the Coconut library with 715K compounds as a chemical 
  space of reference. ECFP4 fingerprints (2048 bits) and RDKit physicochemical 
  descriptors are used as molecular descriptors. Two coordinates are returned 
  for each projection method.
